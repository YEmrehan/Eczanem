<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım Modu | Maintenance</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            /* Mobilde dış boşluk */
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 2.5rem 1.5rem;
            /* İç boşluklar dengelendi */
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 650px;
            width: 100%;
            margin: auto;
        }

        h1 {
            /* Mobilde taşmayı önleyen kritik ayarlar */
            font-size: clamp(2rem, 10vw, 3.5rem);
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            overflow-wrap: break-word;
            word-wrap: break-word;
            hyphens: auto;
        }

        .price-tag {
            display: block;
            font-size: 1.1rem;
            margin: 8px 0;
            color: #94a3b8;
        }

        .highlight {
            color: #f59e0b;
            font-weight: 600;
        }

        .gift-card {
            margin-top: 2.5rem;
            padding: 20px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.05) 100%);
            border: 1px dashed rgba(52, 211, 153, 0.4);
            border-radius: 16px;
            position: relative;
        }

        .gift-card::before {
            content: '🎁';
            font-size: 1.5rem;
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            padding: 0 10px;
        }

        .gift-text {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            line-height: 1.6;
            color: #34d399;
            font-style: italic;
        }

        .gear {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Çok küçük ekranlar için ekstra güvenli alan */
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                letter-spacing: 1px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="gear">⚙️</div>
        <h1>MAINTENANCE</h1>

        <div class="content">
            <span class="price-tag">Animasyon <span class="highlight">2000TL</span></span>
            <span class="price-tag">Web sitesi <span class="highlight">30000TL</span></span>

            <div class="gift-card">
                <p class="gift-text">
                    Ama sen zaten 1 günde yapabiliyormuşsun.
                </p>
            </div>
        </div>
    </div>
</body>

</html>
