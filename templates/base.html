<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Eczanem{% endblock %} — Eczane Stok Takip</title>
    <meta name="description" content="{% block meta_desc %}Modern eczane stok takip ve satış sistemi{% endblock %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-inner">
            <a href="/" class="nav-brand">
                <span class="brand-icon">💊</span>
                <span class="brand-text">Eczanem</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}">Ana Sayfa</a>
                <a href="/urunler" class="nav-link {% if active_page == 'products' %}active{% endif %}">Ürünler</a>
                <a href="/admin" class="nav-link nav-link-admin {% if active_page == 'admin' %}active{% endif %}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Yönetim
                </a>
            </div>
            <button class="nav-mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menü">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <span class="brand-icon">💊</span>
                    <span>Eczanem</span>
                </div>
                <p class="footer-text">Modern eczane stok takip ve satış sistemi.</p>
                <p class="footer-copy">&copy; 2026 Eczanem. Tüm hakları saklıdır.</p>
            </div>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
